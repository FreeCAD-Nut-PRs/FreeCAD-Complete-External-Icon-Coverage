name: Build FreeCAD Windows

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'CMake target to build'
        required: true
        default: 'FreeCAD'
        type: choice
        options:
          - FreeCAD
          - FreeCADGui
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 240

    env:
      LIBPACK_URL: https://github.com/FreeCAD/FreeCAD-LibPack/releases/download/3.1.1.3/LibPack-1.1.0-v3.1.1.3-Release.7z
      LIBPACK_NAME: LibPack-1.1.0-v3.1.1.3-Release

    steps:
      - name: Show selected ref
        shell: pwsh
        run: |
          Write-Host "Workflow file branch: ${{ github.workflow_ref }}"
          Write-Host "Code branch/tag selected in Run workflow: ${{ github.ref_name }}"
          Write-Host "Build target: ${{ inputs.build_target }}"
          Write-Host "Build type: ${{ inputs.build_type }}"

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download and flatten FreeCAD LibPack
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\libpack.7z"
          $tempExtract = "$env:RUNNER_TEMP\libpacktemp"
          $libpackDir = "${{ github.workspace }}\freecad_libpack"

          Remove-Item $tempExtract -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $libpackDir -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path $tempExtract | Out-Null
          New-Item -ItemType Directory -Force -Path $libpackDir | Out-Null

          Invoke-WebRequest -Uri "${{ env.LIBPACK_URL }}" -OutFile $archive
          7z x $archive "-o$tempExtract" -y

          $innerRoot = Join-Path $tempExtract "${{ env.LIBPACK_NAME }}"
          if (-not (Test-Path $innerRoot)) {
            Write-Host "Top-level extracted contents:"
            Get-ChildItem -Path $tempExtract | Select-Object FullName
            throw "Expected extracted folder not found: $innerRoot"
          }

          Copy-Item (Join-Path $innerRoot '*') $libpackDir -Recurse -Force

          $qtCmakeRoot = Join-Path $libpackDir 'lib\cmake'
          if (-not (Test-Path $qtCmakeRoot)) {
            Write-Host "Flattened libpack contents:"
            Get-ChildItem -Path $libpackDir | Select-Object FullName
            throw "Flattened LibPack does not contain lib\cmake"
          }

          $qtCandidates = Get-ChildItem -Path $qtCmakeRoot -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like 'Qt*' }

          if (-not $qtCandidates) {
            Write-Host "lib\cmake contents:"
            Get-ChildItem -Path $qtCmakeRoot | Select-Object FullName
            throw "Flattened LibPack does not contain a Qt cmake package folder"
          }

          "FREECAD_LIBPACK_DIR=$libpackDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved FREECAD_LIBPACK_DIR: $libpackDir"
          Write-Host "Detected Qt package folders:"
          $qtCandidates | ForEach-Object { Write-Host $_.FullName }

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B "${{ github.workspace }}\build" "${{ github.workspace }}" `
            --preset release `
            -DCMAKE_VS_NO_COMPILE_BATCHING=ON `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install" `
            -DFREECAD_USE_PCH=OFF `
            -DFREECAD_RELEASE_PDB=OFF `
            -DFREECAD_LIBPACK_DIR="$env:FREECAD_LIBPACK_DIR" `
            -DFREECAD_COPY_DEPEND_DIRS_TO_BUILD=ON `
            -DFREECAD_COPY_LIBPACK_BIN_TO_BUILD=ON `
            -DFREECAD_COPY_PLUGINS_BIN_TO_BUILD=ON

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: |
          cmake --build "${{ github.workspace }}\build" `
            --config "${{ inputs.build_type }}" `
            --target "${{ inputs.build_target }}"

      - name: Install runnable build
        shell: pwsh
        run: |
          cmake --install "${{ github.workspace }}\build" `
            --config "${{ inputs.build_type }}" `
            --prefix "${{ github.workspace }}\install"

      - name: Verify FreeCAD executable exists
        shell: pwsh
        run: |
          $candidates = @(
            "${{ github.workspace }}\install\bin\FreeCAD.exe",
            "${{ github.workspace }}\install\FreeCAD.exe"
          )

          $found = $null
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              $found = $candidate
              break
            }
          }

          if (-not $found) {
            Write-Host "Install tree contents:"
            Get-ChildItem -Path "${{ github.workspace }}\install" -Recurse -Depth 3 -ErrorAction SilentlyContinue |
              Select-Object FullName
            throw "FreeCAD.exe was not found in the install tree."
          }

          Write-Host "Found runnable executable at: $found"

      - name: Upload runnable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeCAD-Windows-runnable-${{ inputs.build_target }}-${{ inputs.build_type }}-run${{ github.run_number }}
          path: ${{ github.workspace }}\install
          if-no-files-found: error
          retention-days: 14
