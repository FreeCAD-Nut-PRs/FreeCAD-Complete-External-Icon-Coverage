name: Build FreeCAD Windows

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'CMake target to build'
        required: true
        default: 'FreeCADGui'
        type: choice
        options:
          - FreeCADGui
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      LIBPACK_URL: https://github.com/FreeCAD/FreeCAD-LibPack/releases/download/3.1.1.3/LibPack-1.1.0-v3.1.1.3-Release.7z
      LIBPACK_NAME: LibPack-1.1.0-v3.1.1.3-Release

    steps:
      - name: Show selected ref
        shell: pwsh
        run: |
          Write-Host "Workflow file branch: ${{ github.workflow_ref }}"
          Write-Host "Code branch/tag selected in Run workflow: ${{ github.ref_name }}"

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download and flatten FreeCAD LibPack
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\libpack.7z"
          $tempExtract = "$env:RUNNER_TEMP\libpacktemp"
          $libpackDir = "${{ github.workspace }}\freecad_libpack"

          Remove-Item $tempExtract -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $libpackDir -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path $tempExtract | Out-Null
          New-Item -ItemType Directory -Force -Path $libpackDir | Out-Null

          Invoke-WebRequest -Uri "${{ env.LIBPACK_URL }}" -OutFile $archive
          7z x $archive "-o$tempExtract" -y

          $innerRoot = Join-Path $tempExtract "${{ env.LIBPACK_NAME }}"
          if (-not (Test-Path $innerRoot)) {
            Write-Host "Top-level extracted contents:"
            Get-ChildItem -Path $tempExtract | Select-Object FullName
            throw "Expected extracted folder not found: $innerRoot"
          }

          Copy-Item (Join-Path $innerRoot '*') $libpackDir -Recurse -Force

          if (-not (Test-Path (Join-Path $libpackDir 'lib\cmake\Qt5'))) {
            Write-Host "Flattened libpack contents:"
            Get-ChildItem -Path $libpackDir | Select-Object FullName
            throw "Flattened LibPack does not contain lib\cmake\Qt5"
          }

          "FREECAD_LIBPACK_DIR=$libpackDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved FREECAD_LIBPACK_DIR: $libpackDir"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B "${{ github.workspace }}\build" "${{ github.workspace }}" `
            --preset release `
            -DCMAKE_VS_NO_COMPILE_BATCHING=ON `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DFREECAD_USE_PCH=OFF `
            -DFREECAD_RELEASE_PDB=OFF `
            -DFREECAD_LIBPACK_DIR="$env:FREECAD_LIBPACK_DIR" `
            -DFREECAD_COPY_DEPEND_DIRS_TO_BUILD=ON `
            -DFREECAD_COPY_LIBPACK_BIN_TO_BUILD=ON `
            -DFREECAD_COPY_PLUGINS_BIN_TO_BUILD=ON

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: |
          cmake --build "${{ github.workspace }}\build" `
            --config "${{ inputs.build_type }}" `
            --target "${{ inputs.build_target }}"

      - name: Prepare artifact folder
        shell: pwsh
        run: |
          $artifactDir = "${{ github.workspace }}\artifact\FreeCAD-Windows"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          if (Test-Path "${{ github.workspace }}\build\bin") {
            Copy-Item "${{ github.workspace }}\build\bin" "$artifactDir\bin" -Recurse -Force
          }

          if (Test-Path "${{ github.workspace }}\build\Mod") {
            Copy-Item "${{ github.workspace }}\build\Mod" "$artifactDir\Mod" -Recurse -Force
          }

          if (Test-Path "${{ github.workspace }}\build\data") {
            Copy-Item "${{ github.workspace }}\build\data" "$artifactDir\data" -Recurse -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeCAD-Windows-${{ github.ref_name }}-${{ inputs.build_target }}-${{ inputs.build_type }}-run${{ github.run_number }}
          path: ${{ github.workspace }}\artifact\FreeCAD-Windows
          if-no-files-found: error
          retention-days: 14
