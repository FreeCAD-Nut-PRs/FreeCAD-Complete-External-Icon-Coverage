name: Build FreeCAD 1.1.0 macOS Bundles (GitHub Runner, Unsigned)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'FreeCAD source tag/branch to build'
        required: true
        default: 'stable/1.1.0-build'
      build_tag:
        description: 'Artifact/version label used in output names'
        required: true
        default: 'FreeCAD_1.1.0'

jobs:
  build-macos:
    name: Build ${{ matrix.label }} bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Intel
            os: macos-15-intel
            target_platform: osx-64
            deploy_target: '10.13'
            arch_slug: x86_64
          - label: macOS Apple Silicon
            os: macos-latest
            target_platform: osx-arm64
            deploy_target: '11.0'
            arch_slug: arm64

    env:
      TARGET_PLATFORM: ${{ matrix.target_platform }}
      MACOS_DEPLOYMENT_TARGET: ${{ matrix.deploy_target }}
      BUILD_TAG: ${{ inputs.build_tag }}
      PIXI_ENVIRONMENT: package

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          submodules: recursive

      - name: Set up Pixi with caching
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.59.0
          working-directory: ./package/rattler-build
          cache: true
          cache-write: true
          cache-key: freecad-macos-v7-${{ matrix.arch_slug }}-

      - name: Install required Pixi environments
        shell: bash -l {0}
        run: |
          set -euo pipefail
          cd package/rattler-build
          pixi install -e default
          pixi install -e package

      - name: Write version info
        shell: bash -l {0}
        run: python3 package/scripts/write_version_info.py ../freecad_version.txt

      - name: Build unsigned macOS bundle
        shell: bash -l {0}
        run: |
          set -euo pipefail
          cd package/rattler-build
          pixi run -e "${PIXI_ENVIRONMENT}" create_bundle

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FreeCAD-1.1.0-macOS-${{ matrix.arch_slug }}-debug
          path: package/rattler-build
          retention-days: 7
